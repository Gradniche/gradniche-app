name: AI-Agent Content Publishing & Sync Workflow

on:
  schedule:
    # Run every Sunday at midnight to research and update university data
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      university:
        description: 'Name of the university to research and add'
        required: true
        type: string

jobs:
  research-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Get current date for branch name
      - name: Get Date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      # 3. Setup Python Environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Install Dependencies
      # Installs google-genai to run the research agent
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      # 5. Run AI Research Agent
      # If triggered manually, research the specified university. 
      # Otherwise, default to researching a predetermined list or queued items.
      - name: Run AI Research Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python agents/research_agent.py "${{ github.event.inputs.university }}"
          else
            # Automated list of universities to refresh regularly
            python agents/research_agent.py "University of California Berkeley"
          fi

      # 6. Validate Schemas & Sync Data to Frontend
      # Compiles the raw JSON data into the production universities.ts file
      - name: Sync and Compile Data
        run: |
          python scripts/sync_data.py --production

      # 7. Check for changes
      - name: Check for Changes
        id: git-check
        run: |
          git status
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      # 8. Create Branch and Push Changes (Safe PR Flow)
      # Does not edit main directly. Creates a feature branch and pushes.
      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="ai/update-university-${{ steps.date.outputs.date }}"
          git config --global user.name "GradNiche AI Publisher"
          git config --global user.email "ai-publisher@gradniche.com"
          
          # Create and checkout a separate branch
          git checkout -b "$BRANCH_NAME"
          
          # Add changes
          git add .
          git commit -m "feat(ai): automated research and sync for university data"
          git push origin "$BRANCH_NAME"
          
          # Open a Pull Request using GitHub CLI
          gh pr create \
            --title "🤖 AI Automated Data Update - ${{ steps.date.outputs.date }}" \
            --body "This PR was automatically created by the **GradNiche AI Research Agent**.\n\n### Changes:\n- Added or updated university JSON profiles under `/data/universities/`.\n- Automatically recompiled `data/universities.ts`.\n\n*Please review changes and merge to trigger production deployment.*" \
            --head "$BRANCH_NAME" \
            --base main
